name: Deploy Best South

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull code mới
        run: |
          cd /opt/best-south/best-south-v2
          git pull origin main

      - name: Rebuild Docker
        run: |
          cd /opt/best-south/best-south-v2
          docker compose down
          docker compose up -d --build
          docker image prune -f